<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Lab: Bootstrap Grid & Sticky Footer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#">Bootstrap Layout</a>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row">
            <div class="col-12 col-md-6 mb-4">
                <div class="p-4 bg-light border text-center">
                    <h2>Column 1</h2>
                    <p>On mobile devices, this takes up 100% width. On desktops, it takes up 50% width.</p>
                </div>
            </div>

            <div class="col-12 col-md-6 mb-4">
                <div class="p-4 bg-light border text-center">
                    <h2>Column 2</h2>
                    <p>Bootstrap handles resizing these components automatically based on the screen width.</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container">
            <p class="mb-0">&copy; 2026 Post Lab Example - Sticky Footer</p>
        </div>
    </footer>

</body>

</html>
