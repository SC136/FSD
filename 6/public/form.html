<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    h1 { text-align: center; font-size: 22px; margin-bottom: 20px; }
    h2 { text-align: center; font-size: 18px; margin: 4px 0 12px; }
    label { display: block; font-weight: bold; font-size: 14px; margin-bottom: 4px; }
    input[type="text"], input[type="email"], input[type="tel"] {
      width: 100%; padding: 9px 12px;
      border: 1px solid #ccc; border-radius: 6px;
      font-size: 14px; margin-bottom: 14px;
    }
    input:focus { outline: none; border-color: #2d87d4; }
    .btn-add {
      width: 100%; padding: 11px;
      background: #2d87d4; color: #fff;
      border: none; border-radius: 6px;
      font-size: 15px; font-weight: bold;
      cursor: pointer; margin-bottom: 16px;
    }
    .btn-add:hover { background: #2272b8; }
    #searchInput { margin-bottom: 16px; }
    .contact-item {
      display: flex; justify-content: space-between;
      align-items: center; padding: 10px 0;
      border-bottom: 1px solid #eee; font-size: 14px;
    }
    .contact-info p { margin: 2px 0; }
    .contact-info .name  { font-weight: bold; }
    .contact-info .sub   { color: #666; font-size: 13px; }
    .btn-delete {
      background: #e74c3c; color: #fff;
      border: none; border-radius: 4px;
      padding: 5px 12px; cursor: pointer;
      font-size: 13px; white-space: nowrap;
    }
    .btn-delete:hover { background: #c0392b; }
    #emptyMsg { text-align: center; color: #999; font-size: 13px; margin-top: 8px; }
  </style>
</head>
<body>
<div class="card">
  <h1>Contact Manager</h1>

  <label>Name:</label>
  <input type="text" id="name" placeholder="Enter Name">

  <label>Email:</label>
  <input type="email" id="email" placeholder="Enter Email">

  <label>Phone Number:</label>
  <input type="tel" id="phone" placeholder="Enter Phone Number">

  <button class="btn-add" onclick="addContact()">Add Contact</button>

  <h2>Contact List</h2>
  <input type="text" id="searchInput" placeholder="Search by name or email..."
         oninput="renderContacts()">

  <div id="contactList"></div>
  <p id="emptyMsg">No contacts yet. Add one above.</p>
</div>

<script>
  const API = 'http://localhost:3000/contacts';

  async function loadContacts() {
    const res  = await fetch(API);
    const data = await res.json();
    window._contacts = data;
    renderContacts();
  }

  function renderContacts() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const list  = (window._contacts || []).filter(c =>
      c.name.toLowerCase().includes(query) ||
      c.email.toLowerCase().includes(query)
    );

    const div = document.getElementById('contactList');
    div.innerHTML = '';
    document.getElementById('emptyMsg').style.display = list.length ? 'none' : 'block';

    list.forEach(c => {
      div.innerHTML += `
        <div class="contact-item">
          <div class="contact-info">
            <p class="name">${c.name}</p>
            <p class="sub">${c.email} &nbsp;|&nbsp; ${c.phone}</p>
          </div>
          <button class="btn-delete" onclick="deleteContact('${c._id}')">Delete</button>
        </div>`;
    });
  }

  async function addContact() {
    const name  = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();

    if (!name || !email || !phone) {
      alert('Please fill in all fields.');
      return;
    }

    await fetch(API, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ name, email, phone })
    });

    document.getElementById('name').value  = '';
    document.getElementById('email').value = '';
    document.getElementById('phone').value = '';
    loadContacts();
  }

  async function deleteContact(id) {
    await fetch(`${API}/${id}`, { method: 'DELETE' });
    loadContacts();
  }

  loadContacts();
</script>
</body>
</html>
