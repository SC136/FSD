<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment 2: Contact Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>Contact Manager</h1>

        <form id="contact-form">
            <input type="hidden" id="edit-index" value="-1">

            <div class="form-group">
                <label for="name">Name:</label>
                <input type="text" id="name" required placeholder="Enter Name">
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" required placeholder="Enter Email">
            </div>

            <div class="form-group">
                <label for="phone">Phone Number:</label>
                <input type="number" id="phone" required placeholder="Enter Phone Number">
            </div>

            <button type="submit" id="submit-btn" class="btn-primary">Add Contact</button>
        </form>

        <h2>Contact List</h2>

        <input type="text" id="search-input" placeholder="Search by name or email..." class="search-bar">

        <ul id="contact-list"></ul>
    </div>

    <script src="script.js"></script>
</body>

</html>
