<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Lab Experiment 2: JSON & Array Filtering</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f4f4f9;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            margin: 0 auto;
        }

        h1 {
            color: #333;
        }

        p {
            color: #555;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Console Array Filtering</h1>
        <p>This program reads a list of products from a JSON string, parses it into a JavaScript object, and logs it to
            the console.</p>
        <p><strong>Press F12 to open your browser's Developer Tools (Console) to view the output.</strong></p>

        <button onclick="filterByMinPrice()">Filter Products by Min Price</button>
    </div>

    <script>
        const productsJSON = `[
            {"id": 1, "name": "Laptop", "price": 1200, "category": "Electronics"},
            {"id": 2, "name": "Smartphone", "price": 800, "category": "Electronics"},
            {"id": 3, "name": "Headphones", "price": 150, "category": "Accessories"},
            {"id": 4, "name": "Office Chair", "price": 250, "category": "Furniture"},
            {"id": 5, "name": "Monitor", "price": 300, "category": "Electronics"}
        ]`;

        const products = JSON.parse(productsJSON);

        function displayProducts(productList, message = "Product Details:") {
            console.log(`\n--- ${message} ---`);

            if (productList.length === 0) {
                console.log("No products found.");
            } else {
                productList.forEach(product => {
                    console.log(`ID: ${product.id} | Name: ${product.name} | Price: $${product.price} | Category: ${product.category}`);
                });
            }
            console.log("-----------------------");
        }

        displayProducts(products, "All Available Products parsed from JSON");

        function filterByMinPrice() {
            const userInput = prompt("Enter a minimum price to filter the products:");

            if (userInput === null) return;

            const minPrice = parseFloat(userInput);

            if (isNaN(minPrice)) {
                console.error("Invalid input. Please enter a valid number for the price.");
                alert("Please enter a valid number.");
                return;
            }

            const filteredProducts = products.filter(product => product.price >= minPrice);

            displayProducts(filteredProducts, `Products costing $${minPrice} or more`);
        }
    </script>
</body>

</html>
